// ============================================================
// ANALYSIS
// ============================================================
async function startAnalysis() {
  const subject = document.getElementById('inputSubject').value.trim();
  const sender = document.getElementById('inputSender').value.trim();
  const body = document.getElementById('inputBody').value.trim();

  if (!body) { alert('请输入邮件正文内容'); return; }
  if (isAnalyzing) return;
  isAnalyzing = true;

  resetWorkflow();
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('analyzeBtn').innerHTML = '<div class="spinner"></div> 分析中...';

  document.getElementById('workflowStream').classList.add('active');
  document.getElementById('reportSection').classList.remove('visible');

  try {
    await streamAnalysis({ subject, sender, body });
  } catch (err) {
    console.error(err);
    showError(err.message || '分析错误');
  } finally {
    isAnalyzing = false;
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('analyzeBtn').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> ANALYZE`;
  }
}

async function streamAnalysis(emailData) {
  const response = await fetch('/api/analyze/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      subject: emailData.subject, sender: emailData.sender,
      recipients: '', body: emailData.body, urls: [],
      headers: {}, has_attachment: false, raw_text: ''
    })
  });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = '';

    let currentEvent = '';
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (line.startsWith('event: ')) { currentEvent = line.slice(7).trim(); }
      else if (line.startsWith('data: ')) {
        try {
          handleSSEEvent(currentEvent, JSON.parse(line.slice(6)));
        } catch (e) {
          try {
            const p = JSON.parse(line.slice(6));
            if (p.type && p.data) handleSSEEvent(p.type, p.data);
          } catch (_) { console.warn('SSE parse:', line.slice(6).substring(0,60)); }
        }
        currentEvent = '';
      } else if (line.trim() !== '') {
        try {
          const p = JSON.parse(line);
          if (p.type && p.data) handleSSEEvent(p.type, p.data);
        } catch (_) { if (i === lines.length - 1) buffer = line; }
      }
    }
  }
}

// ============================================================
// SSE EVENT DISPATCH
// ============================================================
function handleSSEEvent(eventType, data) {
  const handlers = {
    'agent_start': handleAgentStart,
    'agent_log': handleAgentLog,
    'thinking': handleThinking,
    'llm_chunk': handleLlmChunk,
    'tool_call': handleToolCall,
    'agent_done': handleAgentDone,
    'complete': handleComplete,
    'error': (d) => showError(d.message || '未知错误')
  };
  if (handlers[eventType]) handlers[eventType](data);
}

function findMeta(name) {
  // Try exact match first, then index
  const byName = AGENT_META.find(m => m.name === name);
  if (byName) return byName;
  // Try index-based match
  if (typeof name === 'number' || /^\d+$/.test(name)) {
    return AGENT_META[parseInt(name)];
  }
  return null;
}

// ============================================================
// AGENT START: Create a new card
// ============================================================
function handleAgentStart(data) {

  if (!meta) return;

  const idx = meta.index;

  // Add connector before card (except first)
  if (idx > 0) {

  }

// ============================================================

// ============================================================
// LLM CHUNK: Real streaming — buffer chars and start typewriter
// immediately when thinking is done. Don't wait for agent_done.
// With real streaming, tokens arrive one-by-one from the API,
// so the typewriter plays them as they come (natural pacing).
// ============================================================
let llmRenderQueue = {};    // {idx: [char, char, ...]}
let llmRenderTimers = {};   // {idx: timerId}
let llmRenderDone = {};     // {idx: true} when agent_done fires (all chunks received)
let thinkingQueue = {};     // {idx: [text, text, ...]} buffered thinking lines
let thinkingTimers = {};    // {idx: timerId} staggered render timers
let pendingResultHtml = {}; // {idx: html} result card HTML, shown after typewriter ends

function handleLlmChunk(data) {
  const meta = findMeta(data.agent || data.node);
  if (!meta) return;

  const idx = meta.index;
  const el = cardElements[idx];
  if (!el) return;

  const text = data.chunk || '';
  if (!text) return;

  // Show stream container on first chunk
  if (!el.llmStream.classList.contains('active')) {
    el.llmStream.classList.add('active');
  }

  // Buffer characters into queue
  if (!llmRenderQueue[idx]) llmRenderQueue[idx] = [];
  for (const c of text) {
    llmRenderQueue[idx].push(c);
  }

  // Try to start typewriter — will start if thinking is done
  tryStartLlmTypewriter(idx);
}

function renderLlmCharLoop(idx, el) {
  const queue = llmRenderQueue[idx];
  if (!queue || queue.length === 0) {
    llmRenderTimers[idx] = null;
    markLlmDoneIfNeeded(idx, el);
    return;
  }

  // Pop ~2 chars per frame for natural typing speed
  let batch = '';
  const batchSize = 2;
  for (let i = 0; i < batchSize && queue.length > 0; i++) {
    batch += queue.shift();
  }

  el.llmStreamText.textContent += batch;
  el.llmStream.scrollTop = el.llmStream.scrollHeight;

  // ~25ms between batches
  llmRenderTimers[idx] = setTimeout(() => renderLlmCharLoop(idx, el), 25);
}

function markLlmDoneIfNeeded(idx, el) {
  if (llmRenderDone[idx] && el.llmStream.classList.contains('active')) {
    el.llmStream.classList.add('done');
    const label = el.llmStream.querySelector('.stream-label');
    if (label) {
      label.innerHTML = '<span class="stream-dot" style="animation:none;"></span>THINKING COMPLETE';
    }
    el.llmStream.scrollTop = 0;

    // Show result card after LLM typewriter finishes
    if (pendingResultHtml[idx] && el.result) {
      el.result.querySelector('.card-result-title').textContent = '📊 ANALYSIS RESULT';
      el.resultBody.innerHTML = pendingResultHtml[idx];
      el.result.classList.add('visible');
      pendingResultHtml[idx] = null;
    }
  }
}

// ============================================================
// THINKING: Buffer lines and render with staggered delay
// for a natural "one at a time" reveal effect.
// ============================================================
function handleThinking(data) {
  const meta = findMeta(data.agent || data.node);
  if (!meta) return;

  const text = data.chunk || data.text || '';
  if (!text.trim()) return;

  const idx = meta.index;

  // Buffer lines into thinking queue
  if (!thinkingQueue[idx]) thinkingQueue[idx] = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    thinkingQueue[idx].push(trimmed);
  }

  // Start staggered render loop if not already running
  if (!thinkingTimers[idx]) {
    renderThinkingLoop(idx);
  }
}

function renderThinkingLoop(idx) {
  const queue = thinkingQueue[idx];
  if (!queue || queue.length === 0) {
    thinkingTimers[idx] = null;
    // Thinking done — check if we should start LLM typewriter
    tryStartLlmTypewriter(idx);
    return;
  }

  const text = queue.shift();
  const el = cardElements[idx];
  if (el) {
    const item = document.createElement('div');
    item.className = 'progress-item';

    // Format: highlight key metrics
    const formatted = text
      .replace(/(\d+%)/g, '<span class="highlight">$1</span>')
      .replace(/(\d+\/\d+)/g, '<span class="highlight">$1</span>')
      .replace(/(\d+ms)/g, '<span class="dim">$1</span>');

    item.innerHTML = `
      <div class="pi-dot"></div>
      <div class="pi-text">${formatted}</div>
    `;
    el.progress.appendChild(item);
    el.card.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  // ~100ms between each thinking line
  thinkingTimers[idx] = setTimeout(() => renderThinkingLoop(idx), 100);
}

function tryStartLlmTypewriter(idx) {
  // Start typewriter if thinking is done (no pending thinking timer)
  // and there are buffered chunks. Don't wait for agent_done —
  // with real streaming, tokens arrive one-by-one and should play immediately.
  if (!thinkingTimers[idx] && llmRenderQueue[idx] && llmRenderQueue[idx].length > 0) {
    const el = cardElements[idx];
    if (el && !llmRenderTimers[idx]) {
      renderLlmCharLoop(idx, el);
    }
  }
}

function addProgressItem(idx, text, isRunning) {
  // Legacy direct-add for agent_log events — use buffer for staggered rendering
  if (!thinkingQueue[idx]) thinkingQueue[idx] = [];
  if (text && text.trim()) {
    thinkingQueue[idx].push(text.trim());
    if (!thinkingTimers[idx]) {
      renderThinkingLoop(idx);
    }
  }
}

// ============================================================
// TOOL CALL: Add tool chip
// ============================================================
function handleToolCall(data) {
  const meta = findMeta(data.agent || data.node);
  if (!meta) return;

  const idx = meta.index;
  const el = cardElements[idx];
  if (!el) return;

  const chip = document.createElement('span');
  chip.className = 'tool-chip';
  chip.title = (data.input || '') + '\n→ ' + (data.output || '').substring(0, 200);
  chip.innerHTML = `
    <span class="tc-dot"></span>
    <span class="tc-name">${data.tool || '工具'}</span>
    <span class="tc-time">${data.duration_ms || 0}ms</span>
  `;
  el.tools.appendChild(chip);
}

// ============================================================
// AGENT DONE: Finalize card
// ============================================================
function handleAgentDone(data) {
  const meta = findMeta(data.node || data.agent);
  if (!meta) return;

  const idx = meta.index;
  const el = cardElements[idx];
  if (!el) return;

  const result = data.result || {};

  // Update card status
  const riskClass = determineCardClass(idx, result);
  el.card.classList.remove('running');
  el.card.classList.add(riskClass);
  el.badge.classList.remove('running');
  if (riskClass === 'done-danger') {
    el.badge.classList.add('warn');
    el.badge.textContent = 'SUSPICIOUS';
    el.badge.title = '检测到风险特征';
  } else if (riskClass === 'done-warn') {
    el.badge.classList.add('warn');
    el.badge.textContent = 'CAUTION';
  } else {
    el.badge.classList.add('done');
    el.badge.textContent = 'COMPLETE';
  }

  // Mark running progress items as done
  el.progress.querySelectorAll('.progress-item.running').forEach(p => p.classList.remove('running'));

  // Mark that all LLM chunks have been received (agent_done = stream complete)
  llmRenderDone[idx] = true;
  // If typewriter already finished (queue empty, no timer running),
  // show result card now. Otherwise markLlmDoneIfNeeded will handle it
  // when the queue drains.
  if (!llmRenderTimers[idx]) {
    markLlmDoneIfNeeded(idx, el);
  }

  // Update stream label
  if (el.llmStream.classList.contains('active')) {
    const label = el.llmStream.querySelector('.stream-label');
    if (label) {
      label.innerHTML = '<span class="stream-dot" style="animation:none;"></span>ANALYSIS OUTPUT';
    }
  }

  // Build result summary HTML
  let resultHtml = '';
  switch (idx) {
    case 0: // Semantic
      const intent = result.intent || (result.semantic && result.semantic.intent) || '';
      const conf = result.confidence || (result.semantic && result.semantic.confidence) || 0;
      const techs = result.techniques || (result.semantic && result.semantic.persuasion_techniques) || [];
      const expl = result.explanation || (result.semantic && result.semantic.explanation) || '';
      resultHtml = `
        <div class="result-kv"><span class="result-k">意图判定</span><span class="result-v"><span class="result-tag ${intent === 'phishing' ? 'danger' : intent === 'legitimate' ? 'success' : 'warn'}">${translateIntent(intent)}</span></span></div>
        <div class="result-kv"><span class="result-k">置信度</span><span class="result-v"><strong>${Math.round(conf * 100)}%</strong></span></div>
        ${techs.length ? `<div class="result-kv"><span class="result-k">话术识别</span><span class="result-v">${techs.map(t => `<span class="result-tag info">${t}</span>`).join(' ')}</span></div>` : ''}
        ${expl ? `<div class="result-kv"><span class="result-k">推理</span><span class="result-v" style="font-size:11px;color:var(--text-dim);">${escHtml(expl.substring(0, 300))}</span></div>` : ''}
      `;
      break;
    case 1: // Detector
      const det = result.detection || result;
      const sScore = det.sender_score !== undefined ? det.sender_score : 0.5;
      const uScore = det.url_score !== undefined ? det.url_score : 0.5;
      const flags = det.content_flags || [];
      const detExpl = det.explanation || '';
      resultHtml = `
        <div class="result-kv"><span class="result-k">发件人可信度</span><span class="result-v"><strong>${Math.round(sScore * 100)}%</strong> ${det.sender_analysis ? '<span style="font-size:11px;color:var(--text-dim);">— ' + escHtml(det.sender_analysis).substring(0, 80) + '</span>' : ''}</span></div>
        <div class="result-kv"><span class="result-k">URL 安全性</span><span class="result-v"><strong>${Math.round(uScore * 100)}%</strong> ${det.url_analysis ? '<span style="font-size:11px;color:var(--text-dim);">— ' + escHtml(det.url_analysis).substring(0, 80) + '</span>' : ''}</span></div>
        ${flags.length ? `<div class="result-kv"><span class="result-k">风险标记</span><span class="result-v">${flags.map(f => `<span class="result-tag danger">${f}</span>`).join(' ')}</span></div>` : ''}
        ${detExpl ? `<div class="result-kv"><span class="result-k">推理</span><span class="result-v" style="font-size:11px;color:var(--text-dim);">${escHtml(detExpl.substring(0, 300))}</span></div>` : ''}
      `;
      break;
    case 2: // Risk
      const risk = result.risk || result;
      const rScore = risk.risk_score || 0;
      const rLevel = risk.risk_level || '';
      const att = risk.attack_techniques || [];
      const rExpl = risk.explanation || '';
      resultHtml = `
        <div class="result-kv"><span class="result-k">综合评分</span><span class="result-v" style="font-size:20px;font-weight:700;color:${getScoreColor(rScore)};">${rScore}<span style="font-size:14px;">/100</span></span></div>
        <div class="result-kv"><span class="result-k">风险等级</span><span class="result-v"><span class="result-tag ${rLevel === 'critical' || rLevel === 'high' ? 'danger' : rLevel === 'medium' ? 'warn' : 'success'}">${translateRiskLevel(rLevel)}</span></span></div>
        ${att.length ? `<div class="result-kv"><span class="result-k">ATT&CK</span><span class="result-v">${att.map(t => `<span class="result-tag info">${t}</span>`).join(' ')}</span></div>` : ''}
        ${rExpl ? `<div class="result-kv"><span class="result-k">推理</span><span class="result-v" style="font-size:11px;color:var(--text-dim);">${escHtml(rExpl.substring(0, 300))}</span></div>` : ''}
      `;
      break;
    case 3: // Response
      const resp = result.response || result;
      const action = resp.action || '';
      const alert = resp.alert_message || '';
      const rec = resp.recommendation || '';
      resultHtml = `
        <div class="result-kv"><span class="result-k">处置动作</span><span class="result-v"><span class="action-badge ${action}">${translateAction(action)}</span></span></div>
        ${alert ? `<div class="result-kv"><span class="result-k">告警</span><span class="result-v">${escHtml(alert.substring(0, 200))}</span></div>` : ''}
        ${rec ? `<div class="result-kv"><span class="result-k">建议</span><span class="result-v">${escHtml(rec.substring(0, 200))}</span></div>` : ''}
      `;
      break;
  }

  el.resultBody.innerHTML = resultHtml;
  // If LLM typewriter will run, delay showing result card
  if (llmRenderQueue[idx] && llmRenderQueue[idx].length > 0) {
    pendingResultHtml[idx] = resultHtml;
    // result card stays hidden until markLlmDoneIfNeeded
  } else {
    el.result.classList.add('visible');
    pendingResultHtml[idx] = null;
  }
}

function determineCardClass(idx, result) {
  if (idx === 0) {
    const intent = result.intent || (result.semantic && result.semantic.intent) || '';
    return intent === 'phishing' ? 'done-danger' : intent === 'suspicious' ? 'done-warn' : 'done-safe';
  }
  if (idx === 1) {
    const det = result.detection || result;
    const flags = det.content_flags || [];
    return flags.length > 2 ? 'done-danger' : flags.length > 0 ? 'done-warn' : 'done-safe';
  }
  if (idx === 2) {
    const risk = result.risk || result;
    const level = risk.risk_level || '';
    return (level === 'critical' || level === 'high') ? 'done-danger' : level === 'medium' ? 'done-warn' : 'done-safe';
  }
  if (idx === 3) {
    const resp = result.response || result;
    const action = resp.action || '';
    return (action === 'isolate' || action === 'quarantine') ? 'done-danger' : action === 'alert' ? 'done-warn' : 'done-safe';
  }
  return 'done-safe';
}

// ============================================================
// CONNECTOR between cards
// ============================================================
function addConnector(afterIdx) {
  const stream = document.getElementById('workflowStream');
  const connector = document.createElement('div');
  connector.className = 'card-connector';
  const text = AGENT_CONNECTORS[afterIdx] || '';
  connector.innerHTML = `<span class="card-connector-text">${text}</span>`;
  stream.appendChild(connector);
}

// ============================================================
// COMPLETE: Render final report
// ============================================================
function handleComplete(data) {
  renderReport(data);
  const rs = document.getElementById('reportSection');
  rs.classList.add('visible');
  setTimeout(() => rs.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
}

function renderReport(data) {
  const body = document.getElementById('reportBody');
  const isPhishing = data.is_phishing || false;
  const riskScore = data.risk_score || (data.risk && data.risk.risk_score) || 0;
  const riskLevel = data.risk_level || (data.risk && data.risk.risk_level) || 'unknown';

  // Verdict
  const verdictClass = isPhishing ? 'phishing' : riskScore < 30 ? 'safe' : 'suspicious';
  const verdictIcon = isPhishing ? '🚨' : riskScore < 30 ? '✅' : '⚠️';
  const verdictTitle = isPhishing ? 'THREAT DETECTED — 钓鱼邮件威胁' : riskScore < 30 ? 'CLEAR — 邮件安全' : 'SUSPICIOUS — 存在可疑特征';
  const verdictSub = isPhishing
    ? '该邮件具有明显的钓鱼攻击特征，建议立即执行隔离处置'
    : riskScore < 30 ? '未检测到明显的钓鱼攻击特征，可正常处理' : '部分特征需要人工复核确认';

  const scoreColorClass = riskScore >= 60 ? 'danger' : riskScore >= 30 ? 'warn' : 'success';

  let html = `
    <div class="report-verdict ${verdictClass}">
      <div class="verdict-icon">${verdictIcon}</div>
      <div class="verdict-text">
        <div class="verdict-title">${verdictTitle}</div>
        <div class="verdict-subtitle">${verdictSub}</div>
      </div>
      <div class="verdict-score ${scoreColorClass}">${Math.round(riskScore)}<span style="font-size:14px;">/100</span></div>
    </div>
    <div class="report-cards">
  `;

  // Semantic card
  const sem = data.semantic || data.semantic_result || {};
  if (sem.intent) {
    html += `<div class="report-card">
      <div class="report-card-title">🧠 语义意图分析 / SEMANTIC INTENT</div>
      <div class="report-card-body">
        <div class="kv"><span class="kv-k">意图</span><span class="kv-v"><span class="result-tag ${sem.intent === 'phishing' ? 'danger' : sem.intent === 'legitimate' ? 'success' : 'warn'}">${translateIntent(sem.intent)}</span></span></div>
        <div class="kv"><span class="kv-k">置信度</span><span class="kv-v">${Math.round((sem.confidence || 0) * 100)}%</span></div>
        ${(sem.persuasion_techniques || []).length ? `<div class="kv"><span class="kv-k">话术</span><span class="kv-v">${sem.persuasion_techniques.join(', ')}</span></div>` : ''}
      </div>
    </div>`;
  }

  // Detection card
  const det = data.detection || data.detection_result || {};
  if (det.sender_score !== undefined) {
    html += `<div class="report-card">
      <div class="report-card-title">🔍 多维关联检测 / MULTI-VECTOR</div>
      <div class="report-card-body">
        <div class="kv"><span class="kv-k">发件人</span><span class="kv-v">${Math.round((det.sender_score || 0.5) * 100)}% 可信</span></div>
        <div class="kv"><span class="kv-k">URL</span><span class="kv-v">${Math.round((det.url_score || 0.5) * 100)}% 安全</span></div>
        ${(det.content_flags || []).length ? `<div class="kv"><span class="kv-k">标记</span><span class="kv-v">${det.content_flags.join(', ')}</span></div>` : ''}
      </div>
    </div>`;
  }

  // Risk card
  const risk = data.risk || data.risk_result || {};
  if (risk.risk_score !== undefined) {
    html += `<div class="report-card">
      <div class="report-card-title">⚖️ 风险研判 / RISK ASSESSMENT</div>
      <div class="report-card-body">
        <div class="kv"><span class="kv-k">评分</span><span class="kv-v"><strong>${risk.risk_score}/100</strong></span></div>
        <div class="kv"><span class="kv-k">等级</span><span class="kv-v"><span class="result-tag ${risk.risk_level === 'critical' || risk.risk_level === 'high' ? 'danger' : risk.risk_level === 'medium' ? 'warn' : 'success'}">${translateRiskLevel(risk.risk_level)}</span></span></div>
      </div>
    </div>`;
  }

  // Response card
  const resp = data.response || data.response_result || {};
  if (resp.action) {
    html += `<div class="report-card">
      <div class="report-card-title">🛡️ 响应处置 / RESPONSE PROTOCOL</div>
      <div class="report-card-body">
        <div class="kv"><span class="kv-k">动作</span><span class="kv-v"><span class="action-badge ${resp.action}">${translateAction(resp.action)}</span></span></div>
        ${resp.recommendation ? `<div class="kv"><span class="kv-k">建议</span><span class="kv-v" style="font-size:11px;">${escHtml(resp.recommendation)}</span></div>` : ''}
      </div>
    </div>`;
  }

  html += '</div>';
  body.innerHTML = html;
}

// ============================================================
// RESET & HELPERS
// ============================================================
function resetWorkflow() {
  activeCardIdx = -1;
  cardElements = {};
  cardToolCount = {};
  llmRenderQueue = {};
  llmRenderDone = {};
  thinkingQueue = {};
  pendingResultHtml = {};
  // Clear any pending timers
  Object.values(llmRenderTimers).forEach(t => clearTimeout(t));
  Object.values(thinkingTimers).forEach(t => clearTimeout(t));
  llmRenderTimers = {};
  thinkingTimers = {};
  document.getElementById('workflowStream').innerHTML = '';
  document.getElementById('reportSection').classList.remove('visible');
}

function showError(message) {
  if (activeCardIdx >= 0 && cardElements[activeCardIdx]) {
    const el = cardElements[activeCardIdx];
    el.card.classList.add('error');
    el.badge.classList.remove('running');
    el.badge.classList.add('error');
    el.badge.textContent = 'ERROR';
    addProgressItem(activeCardIdx, '✕ 错误: ' + message, false);
  } else {
    alert('分析错误: ' + message);
  }
}

// ============================================================
// TRANSLATION
// ============================================================
function translateIntent(intent) {
  const m = { phishing: '钓鱼邮件', legitimate: '正常邮件', suspicious: '可疑邮件' };
  return m[intent] || intent || '未知';
}
function translateRiskLevel(level) {
  const m = { critical: '极高风险', high: '高风险', medium: '中风险', low: '低风险', safe: '安全' };
  return m[level] || level || '未知';
}
function translateAction(action) {
  const m = { isolate: '🚫 立即隔离', quarantine: '⚠️ 隔离观察', alert: '🔔 告警提示', pass: '✅ 放行通过' };
  return m[action] || action || '未知';
}
function getScoreColor(score) {
  if (score >= 75) return 'var(--danger)';
  if (score >= 50) return 'var(--warn)';
  return 'var(--success)';
}
function escHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
